    <path d="M110 168v34"/>
    <path d="M18 110h34"/>
    <path d="M168 110h34"/>
    <path d="M45 45l25 25"/>
    <path d="M175 45l-25 25"/>
    <path d="M45 175l25-25"/>
    <path d="M175 175l-25-25"/>
  </g>

  <text x="110" y="123" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="900" class="white">AHC</text>
  <text x="110" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="800" class="white">ANIMAL HEALTH</text>

  <g transform="translate(92 22)">

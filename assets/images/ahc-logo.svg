<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-labelledby="title desc">
  <title id="title">Animal Health Care Centre logo</title>
  <desc id="desc">Circular AHC logo with livestock symbols in deep green, white, and gold.</desc>
  <defs>
    <style>
      .green{fill:#145A32}
      .gold{fill:#D4A017}
      .white{fill:#FFFFFF}
      .stroke-green{fill:none;stroke:#145A32;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}
      .stroke-gold{fill:none;stroke:#D4A017;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>

  <circle cx="110" cy="110" r="101" class="white"/>
  <circle cx="110" cy="110" r="101" class="stroke-green"/>
  <circle cx="110" cy="110" r="63" class="green"/>
  <circle cx="110" cy="110" r="73" class="stroke-gold"/>

  <g class="stroke-gold">
